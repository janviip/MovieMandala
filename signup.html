<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Mandala - Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="brand">
      <img src="assets/logo.png" class="navbar-logo" />
      <span class="brand-name">Movie Mandala</span>
    </div>
    <div class="nav-links">
      <a href="result.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="login.html" class="btn-nav">Login</a>
    </div>
  </nav>

  <!-- ===== SIGN UP PAGE ===== -->
  <div class="auth-bg">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="assets/logo.png" class="auth-logo-img" />
        <h2>Sign Up</h2>
        <p>Create your account to get started</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="Choose a username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create a password" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Repeat your password" />
      </div>

      <button class="btn-primary" onclick="window.location.href='login.html'">
        Create Account
      </button>

      <div class="divider">or</div>

      <button class="btn-google">
        🌐 Continue with Google
      </button>

      <p class="switch-link">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </div>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
