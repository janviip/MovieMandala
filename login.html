<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Mandala - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="brand">
      <img src="assets/logo.png" class="navbar-logo" />
      <span class="brand-name">Movie Mandala</span>
    </div>
    <div class="nav-links">
      <a href="result.html">Home</a>
      <a href="#">About Us</a>
      <a href="signup.html" class="btn-nav">Sign Up</a>
    </div>
  </nav>

  <!-- ===== LOGIN PAGE ===== -->
  <div class="auth-bg">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="assets/logo.png" class="auth-logo-img" />
        <h2>Login</h2>
        <p>Welcome back! Please sign in</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" />
      </div>

      <p class="forgot">Forgot password?</p>

      <button class="btn-primary" onclick="window.location.href='result.html'">
        Login
      </button>

      <div class="divider">or</div>

      <button class="btn-google">
        🌐 Continue with Google
      </button>

      <p class="switch-link">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
      </p>

    </div>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
