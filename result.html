<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Mandala - Home</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/result.css" />
</head>
<body>

  <!-- ===== TOP NAV ===== -->
  <nav class="top-nav">
    <a href="result.html">Home</a>
    <a href="#">About Us</a>
    <a href="login.html" class="active">Login</a>
  </nav>

  <!-- ===== CENTER LOGO + SEARCH ===== -->
  <div class="center-wrap">
    <div class="logo-circle">
      <img src="assets/logo.png" alt="Movie Mandala logo" />
    </div>
    <p class="prompt-text">Select or search the movie that you like?</p>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search a movie......" />
      <button onclick="searchMovie()">Search</button>
    </div>
  </div>

  <!-- ===== MOVIES SECTION ===== -->
  <div class="movies-section">
    <div class="movies-grid" id="moviesGrid">
      <!-- 5 movie cards will be generated here by JavaScript -->
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/result.js"></script>

</body>
</html>
