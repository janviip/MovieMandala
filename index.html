<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Mandala</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="brand">
     <img src="assets/logo.png" class="navbar-logo" />
      <span class="brand-name">Movie Mandala</span>
    </div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About Us</a>
      <button class="btn-nav" onclick="showPage('login')">Login</button>
    </div>
  </nav>

  <!-- ===== SIGN UP PAGE ===== -->
  <div id="signupPage" class="auth-bg">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="assets/logo.png" class="auth-logo-img" />
        <h2>Sign Up</h2>
        <p>Create your account to get started</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="Choose a username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create a password" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Repeat your password" />
      </div>

      <button class="btn-primary" onclick="showPage('login')">
        Create Account
      </button>

      <div class="divider">or</div>

      <button class="btn-google">
        🌐 Continue with Google
      </button>

      <p class="switch-link">
        Already have an account?
        <span onclick="showPage('login')">Login</span>
      </p>

    </div>
  </div>

  <!-- ===== LOGIN PAGE ===== -->
  <div id="loginPage" class="auth-bg hidden">
    <div class="auth-card">

      <div class="auth-logo">
            <img src="assets/logo.png" class="auth-logo-img" />
        <h2>Login</h2>
        <p>Welcome back! Please sign in</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" />
      </div>

      <p class="forgot">Forgot password?</p>

      <button class="btn-primary" onclick="goToHome()">
        Login
      </button>

      <div class="divider">or</div>

      <button class="btn-google">
        🌐 Continue with Google
      </button>

      <p class="switch-link">
        Don't have an account?
        <span onclick="showPage('signup')">Sign Up</span>
      </p>

    </div>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
