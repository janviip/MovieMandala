<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Mandala Login</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="login-box">

        <img src="assets/logo.png" alt="Logo" class="logo">

        <h1>Movie Mandala</h1>

        <p>Login to Continue</p>

        <form id="loginForm">

            <input
                type="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p class="signup-text">
            Don't have an account?
            <a href="#">Sign Up</a>
        </p>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
